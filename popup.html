<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Generator</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <h1>Password Generator</h1>

    <div class="output-section">
      <div class="password-display">
        <span id="password-output" class="password-text" title="Click to copy">—</span>
        <button id="copy-btn" class="icon-btn" title="Copy to clipboard" disabled>
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
        </button>
      </div>
      <div id="copy-feedback" class="copy-feedback"></div>
    </div>

    <div class="strength-bar-wrapper">
      <div id="strength-bar" class="strength-bar"></div>
    </div>
    <div id="strength-label" class="strength-label"></div>

    <div class="options">
      <div class="length-row">
        <label for="length-slider">Length</label>
        <div class="length-controls">
          <input type="range" id="length-slider" min="8" max="64" value="16" />
          <input type="number" id="length-number" min="8" max="64" value="16" />
        </div>
      </div>

      <div class="checkboxes">
        <label class="checkbox-label">
          <input type="checkbox" id="cb-uppercase" checked />
          <span class="checkbox-custom"></span>
          Uppercase <span class="sample">A–Z</span>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="cb-lowercase" checked />
          <span class="checkbox-custom"></span>
          Lowercase <span class="sample">a–z</span>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="cb-numbers" checked />
          <span class="checkbox-custom"></span>
          Numbers <span class="sample">0–9</span>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="cb-symbols" />
          <span class="checkbox-custom"></span>
          Symbols <span class="sample">!@#…</span>
        </label>
      </div>
    </div>

    <button id="generate-btn" class="generate-btn">Generate</button>
  </div>

  <script src="src/popup.js"></script>
</body>
</html>
